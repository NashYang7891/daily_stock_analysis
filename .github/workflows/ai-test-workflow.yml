name: Gemini Model Test with Google Auth

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  gemini-model-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LITELLM_MODEL: "gemini-1.5-flash"
      LITELLM_FALLBACK_MODELS: "gpt-4o-free,chatgpt5.4"
      LLM_CHANNELS: "gemini,openai"
      AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
      GOOGLE_CLOUD_PROJECT: "project-8f2455d4-d55b-46de-9d1"
      GOOGLE_CLOUD_REGION: "us-central1"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install litellm openai python-dotenv google-cloud-aiplatform google-auth

      - name: Configure Google Credentials
        run: |
          echo "$GOOGLE_APPLICATION_CREDENTIALS_JSON" > /tmp/google_credentials.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=/tmp/google_credentials.json" >> $GITHUB_ENV

      - name: Test Gemini Model
        run: |
          python - <<EOF
          import os
          from litellm import completion
          from litellm.exceptions import APIError

          os.environ["GEMINI_PROJECT"] = "$GOOGLE_CLOUD_PROJECT"
          os.environ["GEMINI_REGION"] = "$GOOGLE_CLOUD_REGION"

          messages = [{"role": "user", "content": "你好，请回复一句‘Gemini 测试成功’以及你的模型版本"}]
          try:
              response = completion(model="gemini-1.5-flash", messages=messages, temperature=0.5)
              print("✅ Gemini 调用成功！", response.choices[0].message.content)
          except APIError as e:
              print("❌ 调用失败:", str(e))
              exit(1)
          EOF
