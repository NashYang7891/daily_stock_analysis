name: AI Model Integration Test

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  litellm-model-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      LITELLM_MODEL: ${{ vars.LITELLM_MODEL }}
      LITELLM_FALLBACK_MODELS: ${{ vars.LITELLM_FALLBACK_MODELS }}
      LLM_CHANNELS: ${{ vars.LLM_CHANNELS }}
      AIHUBMIX_KEY: ${{ secrets.AIHUBMIX_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies (含 Google SDK)
        run: |
          python -m pip install --upgrade pip
          pip install litellm openai python-dotenv litellm[google]

      - name: Verify Configuration
        run: |
          echo "==================== 配置验证 ===================="
          echo "默认模型(LITELLM_MODEL): $LITELLM_MODEL"
          echo "降级模型(LITELLM_FALLBACK_MODELS): $LITELLM_FALLBACK_MODELS"
          echo "调用渠道(LLM_CHANNELS): $LLM_CHANNELS"
          echo "=================================================="

      - name: Test AI Model Completion
        run: |
          python - <<EOF
          import os
          from litellm import completion
          from litellm.exceptions import APIError

          model = os.getenv("LITELLM_MODEL")
          fallback_str = os.getenv("LITELLM_FALLBACK_MODELS")
          fallback_models = fallback_str.split(",") if fallback_str else []
          channels = os.getenv("LLM_CHANNELS")

          print(f"📋 调用配置：主模型={model}, 降级列表={fallback_models}, 渠道={channels}")
          test_messages = [{"role": "user", "content": "你好，请回复一句‘测试成功’以及你的模型名称"}]

          try:
              response = completion(
                  model=model,
                  messages=test_messages,
                  fallback_models=fallback_models,
                  temperature=0.5
              )
              print("\n✅ 🎉 调用成功！输出结果如下：")
              print(response.choices[0].message.content)
              print(f"\n模型信息: {response.model}")
          except APIError as e:
              print(f"\n❌ 调用失败: {str(e)}")
              exit(1)
          except Exception as e:
              print(f"\n❌ 未知错误: {str(e)}")
              exit(1)
          EOF
