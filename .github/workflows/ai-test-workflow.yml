name: Gemini Model Test (AI Studio)

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  gemini-model-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # 核心配置：仅需 GEMINI_API_KEY，无需 Google Cloud 认证
      LITELLM_MODEL: "gemini/gemini-1.5-pro"  # gemini/ 前缀强制走 AI Studio，否则会走 Vertex AI 需 GCP SDK
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install LiteLLM (仅需基础依赖，无需 Google SDK)
        run: |
          python -m pip install --upgrade pip
          pip install litellm  # 仅需核心库，无需额外 Google 依赖

      - name: Test Gemini Model (AI Studio 方式)
        run: |
          python - <<EOF
          import os
          from litellm import completion
          from litellm.exceptions import APIError

          # 测试消息
          test_messages = [{"role": "user", "content": "你好，请回复一句‘Gemini 测试成功’以及你的模型版本"}]

          try:
              # 直接调用 Gemini (AI Studio 方式，无需 Vertex AI 认证)
              response = completion(
                  model="gemini/gemini-1.5-pro",  # gemini/ 前缀 = AI Studio，无前缀会走 Vertex AI
                  messages=test_messages,
                  temperature=0.5,
                  api_key=os.environ["GEMINI_API_KEY"]  # 显式传入 API Key
              )
              print("\n✅ 🎉 Gemini 调用成功！输出结果如下：")
              print(response.choices[0].message.content)
              print(f"\n模型信息: {response.model}")
          except APIError as e:
              print(f"\n❌ 调用失败: {str(e)}")
              exit(1)
          except Exception as e:
              print(f"\n❌ 未知错误: {str(e)}")
              exit(1)
          EOF
